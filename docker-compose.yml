services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hyper_diligence
      POSTGRES_PASSWORD: hyper_diligence
      POSTGRES_DB: hyper_diligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyper_diligence -d hyper_diligence"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://hyper_diligence:hyper_diligence@db:5432/hyper_diligence
    ports:
      - "80:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
