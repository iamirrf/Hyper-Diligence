name: Build Test Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

      - name: Build Docker image
        run: docker build -t hyper-diligence:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Check deploy secrets
        id: deploy_gate
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -euo pipefail
          missing=()
          for name in EC2_HOST EC2_USER EC2_SSH_KEY S3_BUCKET; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            printf 'CD skipped until these GitHub secrets are set: %s\n' "${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"
          echo "CD secrets present; deployment will run."

      - name: Deploy over SSH
        if: steps.deploy_gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          envs: REPO_URL,S3_BUCKET,AWS_REGION,EDGAR_USER_AGENT,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          script: |
            set -euo pipefail

            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            if ! command -v git >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                ${SUDO} dnf install -y git
              elif command -v apt-get >/dev/null 2>&1; then
                ${SUDO} apt-get update
                ${SUDO} apt-get install -y git
              else
                echo "Unsupported Linux distro: install git manually" >&2
                exit 1
              fi
            fi

            APP_DIR="${HOME}/hyper-diligence"
            if [ -d "${APP_DIR}/.git" ]; then
              cd "${APP_DIR}"
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
            else
              git clone --branch main "${REPO_URL}" "${APP_DIR}"
              cd "${APP_DIR}"
            fi

            write_env() {
              key="$1"
              value="$2"
              value="${value//\'/\'\\\'\'}"
              printf "%s='%s'\n" "${key}" "${value}" >> .env
            }

            : > .env
            write_env POSTGRES_USER "${POSTGRES_USER:-hyper_diligence}"
            write_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-hyper_diligence}"
            write_env POSTGRES_DB "${POSTGRES_DB:-hyper_diligence}"
            write_env EMBEDDING_PROVIDER "local"
            write_env EMBEDDING_MODEL "sentence-transformers/all-MiniLM-L6-v2"
            write_env EMBEDDING_DIMENSIONS "384"
            write_env CHAT_PROVIDER "extractive"
            write_env AWS_REGION "${AWS_REGION:-us-east-1}"
            write_env S3_BUCKET "${S3_BUCKET}"
            write_env S3_ENABLED "true"
            write_env EDGAR_USER_AGENT "${EDGAR_USER_AGENT:-Hyper-Diligence SEC research set EDGAR_USER_AGENT secret}"

            cd ~/hyper-diligence
            bash scripts/deploy_ec2.sh

      - name: Verify public health
        if: steps.deploy_gate.outputs.ready == 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-all-errors \
            --retry-delay 5 \
            "http://${EC2_HOST}/health"
