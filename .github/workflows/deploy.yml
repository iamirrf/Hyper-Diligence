name: Build Test Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q

      - name: Build Docker image
        run: docker build -t hyper-diligence:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Write deployment env file
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          set -euo pipefail
          if [ -z "${S3_BUCKET}" ]; then
            echo "::error::S3_BUCKET GitHub secret is required"
            exit 1
          fi
          {
            echo "POSTGRES_USER=${POSTGRES_USER:-hyper_diligence}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hyper_diligence}"
            echo "POSTGRES_DB=${POSTGRES_DB:-hyper_diligence}"
            echo "EMBEDDING_PROVIDER=local"
            echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2"
            echo "EMBEDDING_DIMENSIONS=384"
            echo "CHAT_PROVIDER=extractive"
            echo "AWS_REGION=${AWS_REGION:-us-east-1}"
            echo "S3_BUCKET=${S3_BUCKET}"
            echo "S3_ENABLED=true"
            echo "EDGAR_USER_AGENT=\"${EDGAR_USER_AGENT:-Hyper-Diligence research amirhosseinaref@outlook.com}\""
          } > .env

      - name: Copy release bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app,Dockerfile,docker-compose.yml,requirements.txt,scripts,.env"
          target: "~/hyper-diligence"
          rm: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/hyper-diligence
            bash scripts/deploy_ec2.sh
